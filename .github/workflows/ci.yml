name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linting tools
        run: pip install ruff==0.4.1 yamllint==1.35.1
      - name: Ruff lint
        run: ruff check . || true
      - name: yamllint
        run: yamllint -d relaxed config/ .github/ || true

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements-ci.txt
      - name: Install OmicSage as editable package
        run: pip install -e .
      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          OMICSAGE_CI: "true"

  docker-build-python:
    name: Docker Build — Python image
    runs-on: ubuntu-latest
    needs: test-python
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Python image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.python
          push: false
          tags: omicsage/python:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
