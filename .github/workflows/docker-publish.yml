name: Publish Docker Images

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - id: meta
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.python
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/omicsage-python:${{ steps.meta.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/omicsage-python:latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.r
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/omicsage-r:${{ steps.meta.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/omicsage-r:latest
